version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gkhub_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-gkhub}
      POSTGRES_USER: ${DB_USER:-gkhub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gkhub_secret}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-gkhub}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gkhub_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gkhub_backend
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    command: npm run start:dev

  nginx:
    image: nginx:alpine
    container_name: gkhub_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads:

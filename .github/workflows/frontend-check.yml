name: Frontend Check

on:
  push:
    paths:
      - 'frontend/**'
      - 'scripts/check-frontend.js'
      - '.github/workflows/frontend-check.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/check-frontend.js'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate frontend (syntax + structure)
        run: node scripts/check-frontend.js

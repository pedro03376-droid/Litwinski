name: Backend Tests

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  test:
    name: Unit + e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Unit tests
        working-directory: backend
        run: npm test

      - name: E2E tests (HTTP stack / guards)
        working-directory: backend
        run: npm run test:e2e

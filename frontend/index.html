<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GK Hub — Goalkeeper Performance Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>

  <style>
    :root {
      --bg:        #0D0D1A;
      --surface:   #161628;
      --card:      #1E1E35;
      --card-2:    #252542;
      --border:    #2a2a4a;
      --primary:   #00D4FF;
      --primary-d: #009ab8;
      --success:   #00C853;
      --warning:   #FFB300;
      --error:     #FF3D57;
      --text:      #E8E8F0;
      --muted:     #6B6B8A;
      --font: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: var(--font); }

    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      transition: transform .3s;
    }
    .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .sidebar-logo h1 span { color: var(--primary); }
    .sidebar-logo p { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-section-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: var(--muted); padding: 8px 20px 4px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--muted); font-size: 13px; font-weight: 500; transition: all .2s; cursor: pointer; border-left: 3px solid transparent; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .nav-item.active { color: var(--primary); border-left-color: var(--primary); background: rgba(0,212,255,.06); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }

    .main { flex: 1; margin-left: 240px; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 16px; font-weight: 600; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .content { padding: 28px; flex: 1; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; transition: all .2s; }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-primary:hover { background: var(--primary-d); }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--card); }
    .btn-danger { background: var(--error); color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .btn-success { background: var(--success); color: #000; }
    .btn-success:hover { opacity: .85; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
    .btn svg { width: 14px; height: 14px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 600; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stat-cyan { color: var(--primary); }
    .stat-green { color: var(--success); }
    .stat-yellow { color: var(--warning); }
    .stat-red { color: var(--error); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); transition: background .15s; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td { padding: 11px 12px; font-size: 13px; white-space: nowrap; }
    .td-actions { display: flex; gap: 6px; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-elite    { background: rgba(0,212,255,.15); color: var(--primary); }
    .badge-excelente{ background: rgba(0,200,83,.15); color: var(--success); }
    .badge-boa      { background: rgba(255,179,0,.15); color: var(--warning); }
    .badge-regular  { background: rgba(255,61,87,.15); color: var(--error); }
    .badge-dev      { background: rgba(107,107,138,.15); color: var(--muted); }

    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; line-height: 1; padding: 4px; transition: color .2s; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--muted); }
    .form-input, .form-select, .form-textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 9px 12px; transition: border-color .2s; width: 100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
    .form-select option { background: var(--card); }
    .form-textarea { resize: vertical; min-height: 80px; }

    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all .2s; }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--primary); background: rgba(0,212,255,.04); }
    .upload-zone svg { width: 40px; height: 40px; color: var(--muted); margin: 0 auto 12px; }
    .upload-zone p { color: var(--muted); font-size: 13px; }
    .upload-zone strong { color: var(--primary); }

    .preview-table-wrap { max-height: 300px; overflow: auto; border: 1px solid var(--border); border-radius: 8px; margin-top: 16px; }
    .preview-table-wrap table thead th { background: var(--surface); position: sticky; top: 0; }
    .mapping-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .mapping-row { display: flex; flex-direction: column; gap: 4px; }
    .mapping-label { font-size: 11px; color: var(--muted); font-weight: 500; }

    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
    .toast { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; min-width: 240px; animation: slideIn .3s ease; border: 1px solid var(--border); }
    .toast-success { background: #0a1f12; color: var(--success); border-color: rgba(0,200,83,.3); }
    .toast-error   { background: #1f0a0d; color: var(--error); border-color: rgba(255,61,87,.3); }
    .toast-info    { background: #081420; color: var(--primary); border-color: rgba(0,212,255,.3); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .page { display: none; }
    .page.active { display: block; }

    .perf-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .perf-bar-label { font-size: 12px; color: var(--muted); width: 130px; flex-shrink: 0; }
    .perf-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .perf-bar-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .6s ease; }
    .perf-bar-val { font-size: 12px; font-weight: 600; width: 30px; text-align: right; flex-shrink: 0; }

    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted); pointer-events: none; }
    .search-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 12px 8px 32px; width: 220px; }
    .search-input:focus { outline: none; border-color: var(--primary); }

    .chart-container { position: relative; height: 200px; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .form-grid { grid-template-columns: 1fr; }
      .mapping-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state svg { width: 48px; height: 48px; margin: 0 auto 12px; opacity: .4; }
    .empty-state p { font-size: 14px; }

    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .import-steps { display: flex; gap: 0; margin-bottom: 24px; }
    .import-step { flex: 1; display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-size: 13px; color: var(--muted); border-bottom: 2px solid var(--border); }
    .import-step.active { color: var(--primary); border-bottom-color: var(--primary); }
    .import-step.done { color: var(--success); border-bottom-color: var(--success); }
    .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .import-step.active .step-num { background: var(--primary); color: #000; }
    .import-step.done .step-num { background: var(--success); color: #000; }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>GK<span>Hub</span></h1>
    <p>Goalkeeper Performance Platform</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Principal</div>
    <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </div>
    <div class="nav-section-label">Gestão</div>
    <div class="nav-item" data-page="goleiras" onclick="navigate('goleiras')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Goleiras
    </div>
    <div class="nav-item" data-page="partidas" onclick="navigate('partidas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
      Partidas
    </div>
    <div class="nav-item" data-page="scout" onclick="navigate('scout')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Scout
    </div>
    <div class="nav-item" data-page="performance" onclick="navigate('performance')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Performance
    </div>
    <div class="nav-section-label">Dados</div>
    <div class="nav-item" data-page="importar" onclick="navigate('importar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importar Excel
    </div>
    <div class="nav-item" onclick="exportarDados()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar Excel
    </div>
  </nav>
  <div class="sidebar-footer">GK Hub v1.0 &copy; 2026</div>
</aside>

<main class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="btn btn-ghost btn-sm" id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="navigate('importar')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importar Excel
      </button>
    </div>
  </header>

  <div class="content">
    <div id="page-dashboard" class="page active">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total de Goleiras</div><div class="stat-value stat-cyan" id="stat-total-gk">0</div><div class="stat-sub">cadastradas</div></div>
        <div class="stat-card"><div class="stat-label">Partidas Registradas</div><div class="stat-value stat-green" id="stat-total-matches">0</div><div class="stat-sub">no sistema</div></div>
        <div class="stat-card"><div class="stat-label">Scouts Realizados</div><div class="stat-value stat-yellow" id="stat-total-scouts">0</div><div class="stat-sub">análises</div></div>
        <div class="stat-card"><div class="stat-label">Média de Performance</div><div class="stat-value stat-cyan" id="stat-avg-perf">—</div><div class="stat-sub">pontuação média</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
        <div class="card">
          <div class="card-header"><span class="card-title">Goleiras Recentes</span><button class="btn btn-ghost btn-sm" onclick="navigate('goleiras')">Ver todas</button></div>
          <div id="dash-recent-gk"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>Nenhuma goleira cadastrada</p></div></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Performance por Goleira</span></div>
          <div class="chart-container"><canvas id="chart-perf"></canvas></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Partidas Recentes</span><button class="btn btn-ghost btn-sm" onclick="navigate('partidas')">Ver todas</button></div>
        <div id="dash-recent-matches"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg><p>Nenhuma partida registrada</p></div></div>
      </div>
    </div>

    <div id="page-goleiras" class="page">
      <div class="card-header" style="margin-bottom:16px;">
        <div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-input" id="search-goleiras" type="text" placeholder="Buscar goleira…" oninput="renderGoleiras()"></div>
        <button class="btn btn-primary" onclick="abrirNovaGoleira()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova Goleira</button>
      </div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>#</th><th>Nome</th><th>Nascimento</th><th>Altura</th><th>Peso</th><th>Equipe</th><th>Categoria</th><th>Pé Dom.</th><th>Performance</th><th>Ações</th></tr></thead><tbody id="tbody-goleiras"><tr><td colspan="10"><div class="empty-state"><p>Nenhuma goleira cadastrada.</p></div></td></tr></tbody></table></div></div>
    </div>

    <div id="page-partidas" class="page">
      <div class="card-header" style="margin-bottom:16px;">
        <div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-input" id="search-partidas" type="text" placeholder="Buscar partida…" oninput="renderPartidas()"></div>
        <button class="btn btn-primary" onclick="abrirNovaPartida()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova Partida</button>
      </div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Data</th><th>Adversário</th><th>Competição</th><th>Goleira</th><th>Resultado</th><th>Gols Sofridos</th><th>Defesas</th><th>Ações</th></tr></thead><tbody id="tbody-partidas"><tr><td colspan="8"><div class="empty-state"><p>Nenhuma partida registrada.</p></div></td></tr></tbody></table></div></div>
    </div>

    <div id="page-scout" class="page">
      <div class="card-header" style="margin-bottom:16px;">
        <span style="font-size:14px;color:var(--muted)">Registro de Scout por Partida</span>
        <button class="btn btn-primary" onclick="abrirNovoScout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Novo Scout</button>
      </div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Goleira</th><th>Partida</th><th>Def. Altas</th><th>Def. Baixas</th><th>Def. Central</th><th>Gols Sofr.</th><th>Intercepções</th><th>Distribuições</th><th>Posicionamento</th><th>Ações</th></tr></thead><tbody id="tbody-scouts"><tr><td colspan="10"><div class="empty-state"><p>Nenhum scout registrado.</p></div></td></tr></tbody></table></div></div>
    </div>

    <div id="page-performance" class="page">
      <div style="display:grid;grid-template-columns:300px 1fr;gap:20px;">
        <div class="card"><div class="card-title" style="margin-bottom:16px;">Selecionar Goleira</div><div id="perf-gk-list" style="display:flex;flex-direction:column;gap:8px;"></div></div>
        <div>

<script>
const DB = {
  load(key) { try { return JSON.parse(localStorage.getItem('gkhub_'+key) || '[]'); } catch { return []; } },
  save(key, data) { localStorage.setItem('gkhub_'+key, JSON.stringify(data)); },
  get goleiras()  { return this.load('goleiras'); },
  get partidas()  { return this.load('partidas'); },
  get scouts()    { return this.load('scouts'); },
  saveGoleiras(d) { this.save('goleiras', d); },
  savePartidas(d) { this.save('partidas', d); },
  saveScouts(d)   { this.save('scouts', d); },
};
let editingId = { goleira: null, partida: null, scout: null };
let importData = { raw: [], headers: [], mapped: [], type: 'goleiras' };
let chartPerf = null, chartEvolucao = null;

const pageTitles = { dashboard: 'Dashboard', goleiras: 'Goleiras', partidas: 'Partidas', scout: 'Scout de Jogo', performance: 'Performance', importar: 'Importar Excel' };
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
  document.getElementById('topbar-title').textContent = pageTitles[page] || page;
  document.getElementById('sidebar').classList.remove('open');
  if (page === 'dashboard') refreshDashboard();
  if (page === 'goleiras') renderGoleiras();
  if (page === 'partidas') renderPartidas();
  if (page === 'scout') renderScouts();
  if (page === 'performance') renderPerformance();
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(m => { m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }); });

function switchTab(btn, tabId) {
  const parent = btn.closest('.modal') || document;
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  parent.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function calcPerformance(scout) {
  const nota = scout.nota ? parseFloat(scout.nota) : null;
  if (nota !== null && nota > 0) return nota;
  const totalDef = (+scout.dad||0)+(+scout.dae||0)+(+scout.dbd||0)+(+scout.dbe||0)+(+scout.dc||0);
  const gols = (+scout.gda||0)+(+scout.gfa||0)+(+scout.gpe||0)+(+scout.gfl||0);
  if (totalDef + gols === 0) return null;
  return Math.min(10, Math.round(totalDef / Math.max(totalDef + gols, 1) * 100) / 10);
}
function classifyPerf(score) {
  if (score === null || score === undefined) return { label: '—', cls: '' };
  if (score >= 9) return { label: 'Elite', cls: 'badge-elite' };
  if (score >= 8) return { label: 'Excelente', cls: 'badge-excelente' };
  if (score >= 7) return { label: 'Boa', cls: 'badge-boa' };
  if (score >= 5) return { label: 'Regular', cls: 'badge-regular' };
  return { label: 'Em Desenvolvimento', cls: 'badge-dev' };
}
function avgPerformance(gkId) {
  const sc = DB.scouts.filter(s => s.goalkeeperId == gkId);
  if (!sc.length) return null;
  const scores = sc.map(calcPerformance).filter(s => s !== null);
  if (!scores.length) return null;
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10;
}

function uid() { return Date.now()+Math.random().toString(36).slice(2,7); }
function formatDate(d) { if (!d) return '—'; try { return new Date(d+'T00:00:00').toLocaleDateString('pt-BR'); } catch { return d; } }

function abrirNovaGoleira() {
  editingId.goleira = null;
  document.getElementById('modal-goleira-title').textContent = 'Nova Goleira';
  ['nome','nasc','num','altura','peso','equipe','obs'].forEach(f => document.getElementById('gk-'+f).value='');
  ['categoria','pe','mao'].forEach(f => document.getElementById('gk-'+f).value='');
  openModal('modal-goleira');
}
function salvarGoleira() {
  const nome = document.getElementById('gk-nome').value.trim();
  if (!nome) { toast('Informe o nome da goleira', 'error'); return; }
  const goleiras = DB.goleiras;
  const obj = { id: editingId.goleira || uid(), nome,
    nasc: document.getElementById('gk-nasc').value,
    num: document.getElementById('gk-num').value,
    altura: document.getElementById('gk-altura').value,
    peso: document.getElementById('gk-peso').value,
    equipe: document.getElementById('gk-equipe').value,
    categoria: document.getElementById('gk-categoria').value,
    pe: document.getElementById('gk-pe').value,
    mao: document.getElementById('gk-mao').value,
    obs: document.getElementById('gk-obs').value,
  };
  if (editingId.goleira) { const i = goleiras.findIndex(g=>g.id===editingId.goleira); if(i!==-1) goleiras[i]={...goleiras[i],...obj}; }
  else goleiras.push(obj);
  DB.saveGoleiras(goleiras); closeModal('modal-goleira'); renderGoleiras(); updateSelects();
  toast(editingId.goleira?'Goleira atualizada!':'Goleira cadastrada!','success');
}
function editarGoleira(id) {
  const g = DB.goleiras.find(x=>x.id===id); if(!g) return;
  editingId.goleira = id;
  document.getElementById('modal-goleira-title').textContent = 'Editar Goleira';
  ['nome','nasc','num','altura','peso','equipe','obs'].forEach(f => document.getElementById('gk-'+f).value=g[f]||'');
  ['categoria','pe','mao'].forEach(f => document.getElementById('gk-'+f).value=g[f]||'');
  openModal('modal-goleira');
}
function excluirGoleira(id) {
  if (!confirm('Excluir esta goleira?')) return;
  DB.saveGoleiras(DB.goleiras.filter(g=>g.id!==id));
  DB.saveScouts(DB.scouts.filter(s=>s.goalkeeperId!==id));
  renderGoleiras(); updateSelects(); toast('Goleira excuída.','info');
}
function renderGoleiras() {
  const q = (document.getElementById('search-goleiras')?.value||'').toLowerCase();
  const list = DB.goleiras.filter(g=>!q||g.nome.toLowerCase().includes(q)||(g.equipe||'').toLowerCase().includes(q));
  const tbody = document.getElementById('tbody-goleiras');
  if (!list.length) { tbody.innerHTML=`<tr><td colspan="10"><div class="empty-state"><p>Nenhuma goleira encontrada.</p></div></td></tr>`; return; }
  tbody.innerHTML = list.map((g,i)=>{
    const avg=avgPerformance(g.id); const {label,cls}=classifyPerf(avg);
    return `<tr><td>${i+1}</td><td><strong>${g.nome}</strong></td><td>${g.nasc?formatDate(g.nasc):'—'}</td><td>${g.altura?g.altura+' cm':'—'}</td><td>${g.peso?g.peso+' kg':'—'}</td><td>${g.equipe||'—'}</td><td>${g.categoria||'—'}</td><td>${g.pe||'—'}</td><td>${avg!==null?`<span class="badge ${cls}">${label} (${avg})</span>`:'<span style="color:var(--muted)">—</span>'}</td><td><div class="td-actions"><button class="btn btn-ghost btn-sm" onclick="editarGoleira('${g.id}')">Editar</button><button class="btn btn-danger btn-sm" onclick="excluirGoleira('${g.id}')">Excluir</button></div></td></tr>`;
  }).join('');
}

function abrirNovaPartida() {
  editingId.partida = null;
  document.getElementById('modal-partida-title').textContent = 'Nova Partida';
  ['data','hora','adv','comp','fase','local','obs'].forEach(f=>document.getElementById('match-'+f).value='');
  document.getElementById('match-goleira').value='';
  document.getElementById('match-gf').value=0; document.getElementById('match-gc').value=0;
  openModal('modal-partida');
}
function salvarPartida() {
  const adv = document.getElementById('match-adv').value.trim();
  if (!adv) { toast('Informe o adversário','error'); return; }
  const partidas = DB.partidas;
  const obj = { id: editingId.partida||uid(),
    data: document.getElementById('match-data').value,
    hora: document.getElementById('match-hora').value,
    adversario: adv,
    competicao: document.getElementById('match-comp').value,
    fase: document.getElementById('match-fase').value,
    local: document.getElementById('match-local').value,
    goalkeeperId: document.getElementById('match-goleira').value,
    gf: +document.getElementById('match-gf').value||0,
    gc: +document.getElementById('match-gc').value||0,
    obs: document.getElementById('match-obs').value,
  };
  if (editingId.partida) { const i=partidas.findIndex(p=>p.id===editingId.partida); if(i!==-1) partidas[i]={...partidas[i],...obj}; }
  else partidas.push(obj);
  DB.savePartidas(partidas); closeModal('modal-partida'); renderPartidas();
  toast(editingId.partida?'Partida atualizada!':'Partida cadastrada!','success');
}
function editarPartida(id) {
  const p=DB.partidas.find(x=>x.id===id); if(!p) return;
  editingId.partida=id;
  document.getElementById('modal-partida-title').textContent='Editar Partida';
  document.getElementById('match-data').value=p.data||'';
  document.getElementById('match-hora').value=p.hora||'';
  document.getElementById('match-adv').value=p.adversario||'';
  document.getElementById('match-comp').value=p.competicao||'';
  document.getElementById('match-fase').value=p.fase||'';
  document.getElementById('match-local').value=p.local||'';
  document.getElementById('match-goleira').value=p.goalkeeperId||'';
  document.getElementById('match-gf').value=p.gf??0;
  document.getElementById('match-gc').value=p.gc??0;
  document.getElementById('match-obs').value=p.obs||'';
  openModal('modal-partida');
}
function excluirPartida(id) {
  if(!confirm('Excluir esta partida?')) return;
  DB.savePartidas(DB.partidas.filter(p=>p.id!==id)); renderPartidas(); toast('Partida excuída.','info');
}
function renderPartidas() {
  const q=(document.getElementById('search-partidas')?.value||'').toLowerCase();
  const list=[...DB.partidas].filter(p=>!q||(p.adversario||'').toLowerCase().includes(q)||(p.competicao||'').toLowerCase().includes(q)).sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const tbody=document.getElementById('tbody-partidas'); const goleiras=DB.goleiras;
  if(!list.length){tbody.innerHTML=`<tr><td colspan="8"><div class="empty-state"><p>Nenhuma partida registrada.</p></div></td></tr>`;return;}
  tbody.innerHTML=list.map(p=>{
    const gk=goleiras.find(g=>g.id===p.goalkeeperId);
    const sc=DB.scouts.filter(s=>s.partidaId===p.id);
    const def=sc.reduce((a,s)=>a+(+s.dad||0)+(+s.dae||0)+(+s.dbd||0)+(+s.dbe||0)+(+s.dc||0),0);
    const r=p.gf>p.gc?'V':p.gf<p.gc?'D':'E';
    const c=r==='V'?'var(--success)':r==='D'?'var(--error)':'var(--warning)';
    const res=p.gf!==undefined&&p.gc!==undefined?`<span style="color:${c};font-weight:700">${r} ${p.gf}×${p.gc}</span>`:'—';
    return `<tr><td>${p.data?formatDate(p.data):'—'}</td><td><strong>${p.adversario}</strong></td><td>${p.competicao||'—'}</td><td>${gk?gk.nome:'—'}</td><td>${res}</td><td>${p.gc??'—'}</td><td>${def||'—'}</td><td><div class="td-actions"><button class="btn btn-ghost btn-sm" onclick="editarPartida('${p.id}')">Editar</button><button class="btn btn-danger btn-sm" onclick="excluirPartida('${p.id}')">Excluir</button></div></td></tr>`;
  }).join('');
}

function abrirNovoScout() {
  editingId.scout=null;
  document.getElementById('modal-scout-title').textContent='Novo Scout';
  document.getElementById('scout-goleira').value='';
  document.getElementById('scout-partida').value='';
  ['dad','dae','dbd','dbe','dc','esq','gda','gfa','gpe','gfl','dpc','dpe','dmc','dme','int','pose','posd','sai'].forEach(f=>{const el=document.getElementById('s-'+f);if(el)el.value=0;});
  document.getElementById('s-nota').value='';
  openModal('modal-scout');
}
function salvarScout() {
  const gkId=document.getElementById('scout-goleira').value;
  if(!gkId){toast('Selecione a goleira','error');return;}
  const scouts=DB.scouts;
  const fields=['dad','dae','dbd','dbe','dc','esq','gda','gfa','gpe','gfl','dpc','dpe','dmc','dme','int','pose','posd','sai','nota'];
  const obj={id:editingId.scout||uid(),goalkeeperId:gkId,partidaId:document.getElementById('scout-partida').value};
  fields.forEach(f=>{obj[f]=document.getElementById('s-'+f)?.value||0;});
  if(editingId.scout){const i=scouts.findIndex(s=>s.id===editingId.scout);if(i!==-1)scouts[i]={...scouts[i],...obj};}
  else scouts.push(obj);
  DB.saveScouts(scouts); closeModal('modal-scout'); renderScouts(); toast('Scout salvo!','success');
}
function editarScout(id) {
  const s=DB.scouts.find(x=>x.id===id); if(!s) return;
  editingId.scout=id;
  document.getElementById('modal-scout-title').textContent='Editar Scout';
  document.getElementById('scout-goleira').value=s.goalkeeperId||'';
  document.getElementById('scout-partida').value=s.partidaId||'';
  ['dad','dae','dbd','dbe','dc','esq','gda','gfa','gpe','gfl','dpc','dpe','dmc','dme','int','pose','posd','sai','nota'].forEach(f=>{const el=document.getElementById('s-'+f);if(el)el.value=s[f]||0;});
  openModal('modal-scout');
}
function excluirScout(id) {
  if(!confirm('Excluir este scout?')) return;
  DB.saveScouts(DB.scouts.filter(s=>s.id!==id)); renderScouts(); toast('Scout excuído.','info');
}
function renderScouts() {
  const goleiras=DB.goleiras; const partidas=DB.partidas; const scouts=DB.scouts;
  const tbody=document.getElementById('tbody-scouts');
  if(!scouts.length){tbody.innerHTML=`<tr><td colspan="10"><div class="empty-state"><p>Nenhum scout registrado.</p></div></td></tr>`;return;}
  tbody.innerHTML=scouts.map(s=>{
    const gk=goleiras.find(g=>g.id===s.goalkeeperId);
    const pt=partidas.find(p=>p.id===s.partidaId);
    const def=(+s.dad||0)+(+s.dae||0)+(+s.dbd||0)+(+s.dbe||0)+(+s.dc||0);
    const gols=(+s.gda||0)+(+s.gfa||0)+(+s.gpe||0)+(+s.gfl||0);
    const dist=(+s.dpc||0)+(+s.dpe||0)+(+s.dmc||0)+(+s.dme||0);
    return `<tr><td><strong>${gk?gk.nome:'—'}</strong></td><td>${pt?pt.adversario+' ('+formatDate(pt.data)+')':'—'}</td><td>${def}</td><td>${(+s.dbd||0)+(+s.dbe||0)}</td><td>${s.dc||0}</td><td>${gols}</td><td>${s.int||0}</td><td>${dist}</td><td>${(+s.pose||0)+(+s.posd||0)}</td><td><div class="td-actions"><button class="btn btn-ghost btn-sm" onclick="editarScout('${s.id}')">Editar</button><button class="btn btn-danger btn-sm" onclick="excluirScout('${s.id}')">Excluir</button></div></td></tr>`;
  }).join('');
}

function renderPerformance() {
  const goleiras=DB.goleiras;
  const el=document.getElementById('perf-gk-list');
  if(!goleiras.length){el.innerHTML=`<div class="empty-state"><p>Nenhuma goleira cadastrada.</p></div>`;return;}
  el.innerHTML=goleiras.map(g=>{
    const avg=avgPerformance(g.id); const {label,cls}=classifyPerf(avg);
    return `<div onclick="showPerfDetail('${g.id}')" style="cursor:pointer;padding:10px 12px;border-radius:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:background .2s;" onmouseover="this.style.background='rgba(255,255,255,.04)'" onmouseout="this.style.background=''">
      <span style="font-weight:500;font-size:13px;">${g.nome}</span>
      ${avg!==null?`<span class="badge ${cls}">${avg}</span>`:'<span style="color:var(--muted);font-size:12px;">sem dados</span>'}
    </div>`;
  }).join('');
}
function showPerfDetail(gkId) {
  const gk=DB.goleiras.find(g=>g.id===gkId); if(!gk) return;
  const scouts=DB.scouts.filter(s=>s.goalkeeperId===gkId);
  const el=document.getElementById('perf-detail');
  if(!scouts.length){el.innerHTML=`<div class="card-title" style="margin-bottom:12px;">${gk.nome}</div><div class="empty-state"><p>Nenhum scout registrado para esta goleira.</p></div>`;return;}
  const totalDef=scouts.reduce((a,s)=>a+(+s.dad||0)+(+s.dae||0)+(+s.dbd||0)+(+s.dbe||0)+(+s.dc||0),0);
  const totalGols=scouts.reduce((a,s)=>a+(+s.gda||0)+(+s.gfa||0)+(+s.gpe||0)+(+s.gfl||0),0);
  const avgNota=avgPerformance(gkId); const {label,cls}=classifyPerf(avgNota);
  const dims=[
    {label:'Defesa Alta',val:Math.min(10,scouts.reduce((a,s)=>a+(+s.dad||0)+(+s.dae||0),0)/scouts.length)},
    {label:'Defesa Baixa',val:Math.min(10,scouts.reduce((a,s)=>a+(+s.dbd||0)+(+s.dbe||0),0)/scouts.length)},
    {label:'Defesa Central',val:Math.min(10,scouts.reduce((a,s)=>a+(+s.dc||0),0)/scouts.length)},
    {label:'Intercepções',val:Math.min(10,scouts.reduce((a,s)=>a+(+s.int||0),0)/scouts.length)},
    {label:'Distribuição',val:Math.min(10,scouts.reduce((a,s)=>a+(+s.dpc||0)+(+s.dmc||0),0)/scouts.length)},
    {label:'Esquadros',val:Math.min(10,scouts.reduce((a,s)=>a+(+s.esq||0),0)/scouts.length)},
  ];
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div><div style="font-size:16px;font-weight:700;">${gk.nome}</div><div style="color:var(--muted);font-size:12px;">${gk.equipe||''} ${gk.categoria?'• '+gk.categoria:''}</div></div>
      ${avgNota!==null?`<span class="badge ${cls}" style="font-size:14px;padding:6px 14px;">${label} — ${avgNota}</span>`:''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
      <div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--primary);">${totalDef}</div><div style="font-size:11px;color:var(--muted);">Defesas</div></div>
      <div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--error);">${totalGols}</div><div style="font-size:11px;color:var(--muted);">Gols Sofridos</div></div>
      <div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--success);">${scouts.length}</div><div style="font-size:11px;color:var(--muted);">Partidas</div></div>
    </div>
    <div>${dims.map(d=>{const pct=Math.min(100,(d.val/10)*100);return `<div class="perf-bar-row"><div class="perf-bar-label">${d.label}</div><div class="perf-bar-track"><div class="perf-bar-fill" style="width:${pct}%"></div></div><div class="perf-bar-val">${d.val.toFixed(1)}</div></div>`;}).join('')}</div>
  `;
  const labels=scouts.map((_,i)=>`P${i+1}`); const scores=scouts.map(calcPerformance);
  if(chartEvolucao) chartEvolucao.destroy();
  chartEvolucao=new Chart(document.getElementById('chart-evolucao'),{type:'line',data:{labels,datasets:[{label:'Performance',data:scores,borderColor:'#00D4FF',backgroundColor:'rgba(0,212,255,.1)',tension:0.4,fill:true,pointBackgroundColor:'#00D4FF'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#2a2a4a'},ticks:{color:'#6B6B8A'}},y:{grid:{color:'#2a2a4a'},ticks:{color:'#6B6B8A'},min:0,max:10}}}});
}

function refreshDashboard() {
  const goleiras=DB.goleiras; const partidas=DB.partidas; const scouts=DB.scouts;
  document.getElementById('stat-total-gk').textContent=goleiras.length;
  document.getElementById('stat-total-matches').textContent=partidas.length;
  document.getElementById('stat-total-scouts').textContent=scouts.length;
  const allScores=goleiras.map(g=>avgPerformance(g.id)).filter(s=>s!==null);
  document.getElementById('stat-avg-perf').textContent=allScores.length?(allScores.reduce((a,b)=>a+b,0)/allScores.length).toFixed(1):'—';
  const recGk=document.getElementById('dash-recent-gk');
  if(!goleiras.length){recGk.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>Nenhuma goleira cadastrada</p></div>`;}
  else{recGk.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Nome</th><th>Equipe</th><th>Performance</th></tr></thead><tbody>${goleiras.slice(0,5).map(g=>{const avg=avgPerformance(g.id);const{label,cls}=classifyPerf(avg);return `<tr><td><strong>${g.nome}</strong></td><td>${g.equipe||'—'}</td><td>${avg!==null?`<span class="badge ${cls}">${avg}</span>`:'—'}</td></tr>`;}).join('')}</tbody></table></div>`;}
  const recM=document.getElementById('dash-recent-matches');
  if(!partidas.length){recM.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg><p>Nenhuma partida registrada</p></div>`;}
  else{const sorted=[...partidas].sort((a,b)=>(b.data||'').localeCompare(a.data||'')).slice(0,5);recM.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Data</th><th>Adversário</th><th>Competição</th><th>Resultado</th></tr></thead><tbody>${sorted.map(p=>{const r=p.gf>p.gc?'V':p.gf<p.gc?'D':'E';const c=r==='V'?'var(--success)':r==='D'?'var(--error)':'var(--warning)';const res=p.gf!==undefined&&p.gc!==undefined?`<span style="color:${c};font-weight:700">${r} ${p.gf}×${p.gc}</span>`:'—';return `<tr><td>${p.data?formatDate(p.data):'—'}</td><td>${p.adversario}</td><td>${p.competicao||'—'}</td><td>${res}</td></tr>`;}).join('')}</tbody></table></div>`;}
  if(chartPerf) chartPerf.destroy();
  const perfData=goleiras.map(g=>({nome:g.nome.split(' ')[0],score:avgPerformance(g.id)})).filter(d=>d.score!==null);
  if(perfData.length){chartPerf=new Chart(document.getElementById('chart-perf'),{type:'bar',data:{labels:perfData.map(d=>d.nome),datasets:[{label:'Performance',data:perfData.map(d=>d.score),backgroundColor:'rgba(0,212,255,.7)',borderColor:'#00D4FF',borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#6B6B8A'}},y:{grid:{color:'#2a2a4a'},ticks:{color:'#6B6B8A'},min:0,max:10}}}});}
}

function updateSelects() {
  const goleiras=DB.goleiras;
  const opts=`<option value="">Selecionar…</option>`+goleiras.map(g=>`<option value="${g.id}">${g.nome}</option>`).join('');
  ['match-goleira','scout-goleira'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts;});
  const partidas=DB.partidas;
  const popts=`<option value="">Selecionar…</option>`+partidas.map(p=>`<option value="${p.id}">${p.adversario}${p.data?' ('+formatDate(p.data)+')':''}</option>`).join('');
  const spt=document.getElementById('scout-partida');if(spt)spt.innerHTML=popts;
}

const FIELD_DEFS={
  goleiras:[{key:'nome',label:'Nome *'},{key:'nasc',label:'Data Nasc.'},{key:'num',label:'Número'},{key:'altura',label:'Altura (cm)'},{key:'peso',label:'Peso (kg)'},{key:'equipe',label:'Equipe'},{key:'categoria',label:'Categoria'},{key:'pe',label:'Pé Dominante'},{key:'mao',label:'Mão Dominante'},{key:'obs',label:'Observações'}],
  partidas:[{key:'data',label:'Data *'},{key:'adversario',label:'Adversário *'},{key:'competicao',label:'Competição'},{key:'fase',label:'Fase'},{key:'local',label:'Local'},{key:'gf',label:'Gols a Favor'},{key:'gc',label:'Gols Contra'},{key:'obs',label:'Observações'}],
  scouts:[{key:'goalkeeperId',label:'Nome Goleira *'},{key:'dad',label:'Def. Alta Dir.'},{key:'dae',label:'Def. Alta Esq.'},{key:'dbd',label:'Def. Baixa Dir.'},{key:'dbe',label:'Def. Baixa Esq.'},{key:'dc',label:'Def. Central'},{key:'esq',label:'Esquadros'},{key:'gda',label:'Gols Dentro'},{key:'gfa',label:'Gols Fora'},{key:'int',label:'Intercepções'},{key:'dpc',label:'Dist. Pé Certo'},{key:'dpe',label:'Dist. Pé Errado'},{key:'nota',label:'Nota (0-10)'}],
};
function handleFileUpload(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){toast('Planilha sem dados suficientes.','error');return;}
      importData.headers=rows[0].map(String);
      importData.raw=rows.slice(1).filter(r=>r.some(c=>c!==''));
      importData.type=document.getElementById('import-type').value;
      importStep(2); toast(`${importData.raw.length} linhas carregadas!`,'success');
    }catch(err){toast('Erro ao ler arquivo: '+err.message,'error');}
  };
  reader.readAsBinaryString(file);
}
function importStep(step) {
  [1,2,3].forEach(n=>{
    document.getElementById('import-step-'+n).style.display=n===step?'block':'none';
    document.getElementById('step-'+n).className='import-step '+(n<step?'done':n===step?'active':'');
  });
  if(step===2) buildMappingUI();
  if(step===3) buildConfirmPreview();
}
function buildMappingUI() {
  const fields=FIELD_DEFS[importData.type]||[];
  document.getElementById('mapping-grid').innerHTML=fields.map(f=>`
    <div class="mapping-row"><div class="mapping-label">${f.label}</div>
    <select class="form-select" id="map-${f.key}"><option value="">— ignorar —</option>
    ${importData.headers.map((h,i)=>`<option value="${i}" ${h.toLowerCase().includes(f.key.toLowerCase())||h.toLowerCase().includes(f.label.toLowerCase().replace(' *',''))?'selected':''}>${h}</option>`).join('')}
    </select></div>`).join('');
  document.getElementById('preview-wrap').innerHTML=`<table><thead><tr>${importData.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${importData.raw.slice(0,5).map(r=>`<tr>${importData.headers.map((_,i)=>`<td>${r[i]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}
function buildConfirmPreview() {
  const fields=FIELD_DEFS[importData.type]||[];
  const mapped=importData.raw.map(row=>{
    const obj={id:uid()};
    fields.forEach(f=>{const sel=document.getElementById('map-'+f.key);if(sel&&sel.value!=='')obj[f.key]=row[+sel.value]??'';});
    return obj;
  });
  importData.mapped=mapped;
  document.getElementById('import-count').textContent=`${mapped.length} registros prontos para importação.`;
  const fields2=fields.filter(f=>{const s=document.getElementById('map-'+f.key);return s&&s.value!==''});
  document.getElementById('confirm-preview').innerHTML=`<table><thead><tr>${fields2.map(f=>`<th>${f.label}</th>`).join('')}</tr></thead><tbody>${mapped.slice(0,10).map(r=>`<tr>${fields2.map(f=>`<td>${r[f.key]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}
function confirmarImportacao() {
  const type=importData.type;
  if(type==='goleiras'){const novo=importData.mapped.filter(r=>r.nome);DB.saveGoleiras([...DB.goleiras,...novo]);toast(`${novo.length} goleiras importadas!`,'success');}
  else if(type==='partidas'){const novo=importData.mapped.filter(r=>r.adversario||r.data);DB.savePartidas([...DB.partidas,...novo]);toast(`${novo.length} partidas importadas!`,'success');}
  else if(type==='scouts'){
    const goleiras=DB.goleiras;
    const novo=importData.mapped.map(r=>{
      if(r.goalkeeperId){const m=goleiras.find(g=>g.nome.toLowerCase()===String(r.goalkeeperId).toLowerCase());if(m)r.goalkeeperId=m.id;}
      return r;
    });
    DB.saveScouts([...DB.scouts,...novo]); toast(`${novo.length} scouts importados!`,'success');
  }
  updateSelects(); importStep(1); document.getElementById('file-input').value='';
}
function exportarDados() {
  const wb=XLSX.utils.book_new();
  const goleiras=DB.goleiras; const partidas=DB.partidas; const scouts=DB.scouts;
  if(goleiras.length){const ws=XLSX.utils.json_to_sheet(goleiras.map(g=>({Nome:g.nome,Nascimento:g.nasc,Número:g.num,Altura:g.altura,Peso:g.peso,Equipe:g.equipe,Categoria:g.categoria,'Pé':g.pe,Mão:g.mao,Performance:avgPerformance(g.id)??'',Observações:g.obs})));XLSX.utils.book_append_sheet(wb,ws,'Goleiras');}
  if(partidas.length){const gkMap=Object.fromEntries(goleiras.map(g=>[g.id,g.nome]));const ws=XLSX.utils.json_to_sheet(partidas.map(p=>({Data:p.data,Hora:p.hora,Adversário:p.adversario,Competição:p.competicao,Fase:p.fase,Local:p.local,Goleira:gkMap[p.goalkeeperId]||'','Gols a Favor':p.gf,'Gols Contra':p.gc,Observações:p.obs})));XLSX.utils.book_append_sheet(wb,ws,'Partidas');}
  if(scouts.length){const gkMap=Object.fromEntries(goleiras.map(g=>[g.id,g.nome]));const ws=XLSX.utils.json_to_sheet(scouts.map(s=>({Goleira:gkMap[s.goalkeeperId]||s.goalkeeperId,'Def. Alta Dir':s.dad,'Def. Alta Esq':s.dae,'Def. Baixa Dir':s.dbd,'Def. Baixa Esq':s.dbe,'Def. Central':s.dc,Esquadros:s.esq,'Gols Dentro':s.gda,'Gols Fora':s.gfa,Intercepções:s.int,'Dist. Pé Certo':s.dpc,'Dist. Pé Errado':s.dpe,'Dist. Mão Certa':s.dmc,'Dist. Mão Errada':s.dme,Nota:s.nota,Performance:calcPerformance(s)??''})));XLSX.utils.book_append_sheet(wb,ws,'Scouts');}
  XLSX.writeFile(wb,`gkhub_export_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Exportação concluída!','success');
}
function baixarTemplate() {
  const type=document.getElementById('import-type').value;
  const fields=FIELD_DEFS[type];
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([fields.map(f=>f.label.replace(' *',''))]);
  XLSX.utils.book_append_sheet(wb,ws,'Template');
  XLSX.writeFile(wb,`template_${type}.xlsx`);
  toast('Template baixado!','info');
}

const uz=document.getElementById('upload-zone');
if(uz){
  ['dragenter','dragover'].forEach(e=>uz.addEventListener(e,ev=>{ev.preventDefault();uz.classList.add('drag');}));
  ['dragleave','drop'].forEach(e=>uz.addEventListener(e,ev=>{ev.preventDefault();uz.classList.remove('drag');}));
  uz.addEventListener('drop',ev=>{const f=ev.dataTransfer.files[0];if(f){document.getElementById('file-input').files=ev.dataTransfer.files;handleFileUpload(document.getElementById('file-input'));}});
}

if(window.innerWidth<=768) document.getElementById('menu-btn').style.display='flex';
window.addEventListener('resize',()=>{document.getElementById('menu-btn').style.display=window.innerWidth<=768?'flex':'none';});

updateSelects();
refreshDashboard();
<\/script>

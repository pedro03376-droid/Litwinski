[build]
builder = "NIXPACKS"
# --include=dev forces devDependencies (nest cli, typescript) to install even
# when NODE_ENV=production, otherwise `nest build` fails with "nest: not found".
buildCommand = "npm install --include=dev && npm run build"
# Only redeploy when backend code changes — avoids rebuilding (and failing) the
# backend on frontend/CI-only commits.
watchPatterns = ["backend/**"]

[deploy]
startCommand = "node dist/main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.variables]
NODE_ENV = "production"
